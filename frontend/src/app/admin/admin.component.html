<div class="min-h-screen bg-gray-100 py-10">
  <div class="max-w-6xl mx-auto px-4">
    <h1 class="text-4xl font-bold text-center mb-10">Static Page Manager</h1>

    <div class="grid md:grid-cols-2 gap-8">
      <!-- Form -->

      <div class="bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-semibold mb-6">
          {{ editingId ? 'Edit Page' : 'Add New Page' }}
        </h2>

        <form [formGroup]="pageForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <div>
            <label class="block mb-2 font-medium"> Title </label>

            <input
              type="text"
              formControlName="title"
              class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div>
            <label class="block mb-2 font-medium"> Content </label>

            <textarea
              formControlName="content"
              rows="10"
              class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
            ></textarea>
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition"
          >
            {{ editingId ? 'Update Page' : 'Add Page' }}
          </button>
        </form>
      </div>

      <!-- Page List -->

      <div>
        <h2 class="text-2xl font-semibold mb-6">Existing Pages</h2>

        @if (pages.length === 0) {
          <div class="bg-white rounded-xl shadow p-6 text-center text-gray-500">
            No pages found.
          </div>
        }

        @for (page of pages; track page._id) {
          <div class="bg-white rounded-xl shadow-lg p-5 mb-5">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="text-xl font-bold">
                  {{ page.title }}
                </h3>

                <p class="text-gray-500 text-sm">/{{ page.slug }}</p>
              </div>

              <div class="flex gap-2">
                <button
                  (click)="editPage(page)"
                  class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded"
                >
                  Edit
                </button>

                <button
                  (click)="deletePage(page._id!)"
                  class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded"
                >
                  Delete
                </button>
              </div>
            </div>

            <hr class="my-4" />

            <p class="text-gray-700 whitespace-pre-wrap">
              {{ page.content }}
            </p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
