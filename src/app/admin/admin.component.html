@for (page of pages; track page._id) {
<h2>{{ page.title }}</h2>
<p>{{ page.content }}</p>
}

<form [formGroup]="pageForm" (ngSubmit)="onSubmit()" class="border flex flex-col gap-2 p-4 items-center">
  <div class="flex flex-col">
    <label for="title">Title</label>
    <input type="text" name="title" formControlName="title" class="border w-lg" />
  </div>
  <div class="flex flex-col">
    <label for="content">Content</label>
    <textarea name="content" formControlName="content" class="border w-xl h-80"></textarea>
  </div>
  <button type="submit" class="border bg-red-300 w-30">Add Page</button>
</form>
